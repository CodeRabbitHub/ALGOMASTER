# Serves the built React SPA from within the frontend container itself.
# The top-level reverse-proxy (nginx/nginx.conf) forwards non-API traffic
# here on port 80; this config just needs to serve static files with a
# client-side-routing fallback and reasonable caching.
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Hashed build assets (JS/CSS/fonts/images) — safe to cache long-term.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: any unmatched path serves index.html so React Router
    # can handle client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
